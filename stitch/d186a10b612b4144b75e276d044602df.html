<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hesap Makinesi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#007d55",
                    "on-tertiary-fixed-variant": "#005236",
                    "tertiary-fixed": "#6ffbbe",
                    "on-error-container": "#ffdad6",
                    "error-container": "#93000a",
                    "surface-container-lowest": "#070e1d",
                    "background": "#0c1322",
                    "inverse-on-surface": "#293040",
                    "on-surface": "#dce2f7",
                    "tertiary": "#4edea3",
                    "surface-container-low": "#141b2b",
                    "on-secondary-fixed": "#2a1700",
                    "surface-container-high": "#232a3a",
                    "primary-fixed-dim": "#b4c5ff",
                    "secondary": "#ffb95f",
                    "on-primary-container": "#eeefff",
                    "error": "#ffb4ab",
                    "surface": "#0c1322",
                    "on-secondary-fixed-variant": "#653e00",
                    "primary": "#b4c5ff",
                    "secondary-fixed-dim": "#ffb95f",
                    "surface-bright": "#323949",
                    "inverse-surface": "#dce2f7",
                    "secondary-fixed": "#ffddb8",
                    "secondary-container": "#ee9800",
                    "on-primary": "#002a78",
                    "on-primary-fixed": "#00174b",
                    "on-tertiary-container": "#bdffdb",
                    "tertiary-fixed-dim": "#4edea3",
                    "outline": "#8d90a0",
                    "on-surface-variant": "#c3c6d7",
                    "on-tertiary": "#003824",
                    "surface-container": "#191f2f",
                    "surface-dim": "#0c1322",
                    "surface-tint": "#b4c5ff",
                    "on-tertiary-fixed": "#002113",
                    "primary-container": "#2563eb",
                    "primary-fixed": "#dbe1ff",
                    "inverse-primary": "#0053db",
                    "on-secondary-container": "#5b3800",
                    "on-secondary": "#472a00",
                    "surface-variant": "#2e3545",
                    "on-error": "#690005",
                    "on-background": "#dce2f7",
                    "surface-container-highest": "#2e3545",
                    "outline-variant": "#434655",
                    "on-primary-fixed-variant": "#003ea8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="bg-[#0c1322] flex justify-between items-center w-full px-6 py-4 z-20">
<div class="flex items-center gap-3">
<span class="text-xl font-bold text-slate-100 font-headline">Hesap Makinesi</span>
</div>
<div class="flex items-center gap-6">
<button class="text-blue-600 dark:text-blue-500 hover:bg-[#141b2b] transition-colors active:scale-95 duration-100 px-3 py-1 rounded-lg text-sm font-bold">Temizle</button>
<button class="text-slate-400 hover:bg-[#141b2b] transition-colors active:scale-95 duration-100 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
</div>
</header>
<main class="flex flex-1 relative overflow-hidden">
<!-- Main Calculator Canvas -->
<div class="flex-1 flex flex-col items-center justify-center p-6 md:pr-80 transition-all duration-300">
<div class="w-full max-w-md flex flex-col gap-6">
<!-- Display Area -->
<div class="bg-surface-container-lowest rounded-3xl p-8 flex flex-col items-end justify-end shadow-inner h-48 border border-white/5">
<span class="text-outline font-headline text-lg tracking-wider mb-2 opacity-60">2.469,13 × 5</span>
<h1 class="text-on-surface font-headline text-6xl font-bold tracking-tight">12.345,67</h1>
</div>
<!-- Keypad Area -->
<div class="bg-surface-container-low p-4 rounded-[2rem] grid grid-cols-4 gap-4">
<!-- Row 1 -->
<button class="bg-error-container text-on-error-container h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:brightness-110 active:scale-95 transition-all">C</button>
<button class="bg-error-container text-on-error-container h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:brightness-110 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
<button class="bg-surface-container-highest text-on-surface h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:bg-white/5 active:scale-95 transition-all">%</button>
<button class="bg-secondary-container text-on-secondary-container h-16 rounded-xl flex items-center justify-center font-bold text-2xl hover:brightness-110 active:scale-95 transition-all">÷</button>
<!-- Row 2 -->
<button class="bg-surface-container-highest text-on-surface h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:bg-white/5 active:scale-95 transition-all">7</button>
<button class="bg-surface-container-highest text-on-surface h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:bg-white/5 active:scale-95 transition-all">8</button>
<button class="bg-surface-container-highest text-on-surface h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:bg-white/5 active:scale-95 transition-all">9</button>
<button class="bg-secondary-container text-on-secondary-container h-16 rounded-xl flex items-center justify-center font-bold text-2xl hover:brightness-110 active:scale-95 transition-all">×</button>
<!-- Row 3 -->
<button class="bg-surface-container-highest text-on-surface h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:bg-white/5 active:scale-95 transition-all">4</button>
<button class="bg-surface-container-highest text-on-surface h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:bg-white/5 active:scale-95 transition-all">5</button>
<button class="bg-surface-container-highest text-on-surface h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:bg-white/5 active:scale-95 transition-all">6</button>
<button class="bg-secondary-container text-on-secondary-container h-16 rounded-xl flex items-center justify-center font-bold text-2xl hover:brightness-110 active:scale-95 transition-all">-</button>
<!-- Row 4 -->
<button class="bg-surface-container-highest text-on-surface h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:bg-white/5 active:scale-95 transition-all">1</button>
<button class="bg-surface-container-highest text-on-surface h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:bg-white/5 active:scale-95 transition-all">2</button>
<button class="bg-surface-container-highest text-on-surface h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:bg-white/5 active:scale-95 transition-all">3</button>
<button class="bg-secondary-container text-on-secondary-container h-16 rounded-xl flex items-center justify-center font-bold text-2xl hover:brightness-110 active:scale-95 transition-all">+</button>
<!-- Row 5 -->
<button class="col-span-2 bg-surface-container-highest text-on-surface h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:bg-white/5 active:scale-95 transition-all">0</button>
<button class="bg-surface-container-highest text-on-surface h-16 rounded-xl flex items-center justify-center font-bold text-xl hover:bg-white/5 active:scale-95 transition-all">,</button>
<button class="bg-tertiary-container text-white h-16 rounded-xl flex items-center justify-center font-bold text-2xl shadow-lg shadow-tertiary-container/20 hover:brightness-110 active:scale-95 transition-all">=</button>
</div>
<div class="flex justify-center gap-8 mt-4">
<button class="text-outline hover:text-primary transition-colors flex flex-col items-center gap-1">
<span class="material-symbols-outlined" data-icon="calculate">calculate</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Temel</span>
</button>
<button class="text-outline hover:text-primary transition-colors flex flex-col items-center gap-1">
<span class="material-symbols-outlined" data-icon="functions">functions</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Bilimsel</span>
</button>
<button class="text-outline hover:text-primary transition-colors flex flex-col items-center gap-1">
<span class="material-symbols-outlined" data-icon="currency_exchange">currency_exchange</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Birim</span>
</button>
</div>
</div>
</div>
<!-- SideNavBar / History Sidebar -->
<aside class="hidden md:flex bg-[#323949]/80 backdrop-blur-xl fixed right-0 h-full w-80 flex-col p-6 shadow-[-20px_0_40px_rgba(7,14,29,0.4)] border-l border-white/5 z-10 transition-all duration-300 ease-in-out">
<div class="mb-8">
<h2 class="text-lg font-bold text-white font-headline">Geçmiş</h2>
<p class="text-sm text-slate-400">Son İşlemler</p>
</div>
<div class="flex-1 flex flex-col gap-4 overflow-y-auto pr-2 custom-scrollbar">
<!-- History Items -->
<div class="group flex flex-col items-end p-3 rounded-xl hover:bg-white/10 transition-colors cursor-pointer">
<span class="text-xs text-outline mb-1">12 May, 14:20</span>
<span class="text-slate-400 text-sm">10 + 5</span>
<span class="text-white font-bold text-lg">= 15</span>
</div>
<div class="group flex flex-col items-end p-3 rounded-xl hover:bg-white/10 transition-colors cursor-pointer">
<span class="text-xs text-outline mb-1">12 May, 14:18</span>
<span class="text-slate-400 text-sm">250 ÷ 4</span>
<span class="text-white font-bold text-lg">= 62,5</span>
</div>
<div class="group flex flex-col items-end p-3 rounded-xl hover:bg-white/10 transition-colors cursor-pointer">
<span class="text-xs text-outline mb-1">12 May, 14:15</span>
<span class="text-slate-400 text-sm">1.200 - 450</span>
<span class="text-white font-bold text-lg">= 750</span>
</div>
<div class="group flex flex-col items-end p-3 rounded-xl hover:bg-white/10 transition-colors cursor-pointer">
<span class="text-xs text-outline mb-1">12 May, 13:50</span>
<span class="text-slate-400 text-sm">45 × 12</span>
<span class="text-white font-bold text-lg">= 540</span>
</div>
</div>
<div class="mt-auto pt-6 border-t border-white/10 flex flex-col gap-2">
<button class="flex items-center gap-3 text-slate-300 hover:bg-white/10 p-3 rounded-xl transition-all">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-sm font-medium">Ayarlar</span>
</button>
<div class="flex items-center gap-3 p-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-primary-container flex items-center justify-center">
<span class="text-[10px] font-bold text-white">MK</span>
</div>
<div>
<p class="text-xs font-bold text-white leading-none">Mert Korkmaz</p>
<p class="text-[10px] text-slate-400">Pro Kullanıcı</p>
</div>
</div>
</div>
</aside>
</main>
<!-- Bottom Navigation (Mobile Only) -->
<nav class="md:hidden flex justify-around items-center bg-[#070e1d] py-4 border-t border-white/5">
<button class="flex flex-col items-center gap-1 text-blue-500">
<span class="material-symbols-outlined" data-icon="calculate" style="font-variation-settings: 'FILL' 1;">calculate</span>
<span class="text-[10px] font-bold">Hesapla</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="text-[10px] font-bold">Geçmiş</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-[10px] font-bold">Ayarlar</span>
</button>
</nav>
<style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</body></html>
