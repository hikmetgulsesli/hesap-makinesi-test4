<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#007d55",
                    "on-tertiary-fixed-variant": "#005236",
                    "tertiary-fixed": "#6ffbbe",
                    "on-error-container": "#ffdad6",
                    "error-container": "#93000a",
                    "surface-container-lowest": "#070e1d",
                    "background": "#0c1322",
                    "inverse-on-surface": "#293040",
                    "on-surface": "#dce2f7",
                    "tertiary": "#4edea3",
                    "surface-container-low": "#141b2b",
                    "on-secondary-fixed": "#2a1700",
                    "surface-container-high": "#232a3a",
                    "primary-fixed-dim": "#b4c5ff",
                    "secondary": "#ffb95f",
                    "on-primary-container": "#eeefff",
                    "error": "#ffb4ab",
                    "surface": "#0c1322",
                    "on-secondary-fixed-variant": "#653e00",
                    "primary": "#b4c5ff",
                    "secondary-fixed-dim": "#ffb95f",
                    "surface-bright": "#323949",
                    "inverse-surface": "#dce2f7",
                    "secondary-fixed": "#ffddb8",
                    "secondary-container": "#ee9800",
                    "on-primary": "#002a78",
                    "on-primary-fixed": "#00174b",
                    "on-tertiary-container": "#bdffdb",
                    "tertiary-fixed-dim": "#4edea3",
                    "outline": "#8d90a0",

                    "surface-dim": "#0c1322",
                    "surface-tint": "#b4c5ff",

                    "primary-fixed": "#dbe1ff",
                    "inverse-primary": "#0053db",
                    "on-secondary-container": "#5b3800",

                    "surface-variant": "#2e3545",
                    "on-error": "#690005",
                    "on-background": "#dce2f7",
                    "surface-container-highest": "#2e3545",
                    "outline-variant": "#434655",
                    "on-primary-fixed-variant": "#003ea8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .btn-gradient-secondary {
            background: linear-gradient(to bottom, #ee9800, #ffb95f);
        }
        .btn-gradient-tertiary {
            background: linear-gradient(to bottom, #007d55, #4edea3);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col overflow-hidden">
<header class="bg-[#070e1d] shadow-none flex justify-between items-center w-full px-6 py-4 z-50">
<div class="flex items-center gap-3">
<span class="font-headline text-xl font-bold text-slate-100 tracking-tight">Hesap Makinesi</span>
</div>
<div class="flex items-center gap-4">
<button class="text-slate-400 hover:bg-[#141b2b] p-2 rounded-lg transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
<button class="font-headline text-lg font-bold tracking-tight text-blue-600 dark:text-blue-500 hover:bg-[#141b2b] px-3 py-1 rounded transition-colors active:scale-95 duration-100">
                Temizle
            </button>
</div>
</header>
<main class="flex-grow flex relative">
<div class="flex-grow flex flex-col p-6 max-w-4xl mx-auto w-full">
<section class="bg-surface-container-lowest rounded-xl p-8 mb-6 flex flex-col items-end justify-end min-h-[220px] relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-error-container/5 to-transparent pointer-events-none"></div>
<div class="text-outline font-headline text-xl tracking-tight mb-2 opacity-80">
                    125 ÷ 0
                </div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-error text-4xl animate-pulse" data-icon="error" data-weight="fill" style="font-variation-settings: 'FILL' 1;">error</span>
<h1 class="font-headline text-6xl md:text-8xl font-bold tracking-tighter text-error">Tanımsız</h1>
</div>
<div class="mt-4 px-3 py-1 bg-error-container text-on-error-container text-xs font-bold rounded-full uppercase tracking-widest">
                    Hata Durumu
                </div>
</section>
<div class="grid grid-cols-4 gap-4 flex-grow content-start">
<button class="col-span-1 aspect-square bg-error-container text-on-error-container rounded-xl flex items-center justify-center text-2xl font-bold hover:brightness-110 active:scale-95 transition-all duration-100">C</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">( )</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">%</button>
<button class="col-span-1 aspect-square btn-gradient-secondary text-on-secondary-container rounded-xl flex items-center justify-center text-3xl font-bold active:scale-95 transition-all duration-100">÷</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">7</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">8</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">9</button>
<button class="col-span-1 aspect-square btn-gradient-secondary text-on-secondary-container rounded-xl flex items-center justify-center text-3xl font-bold active:scale-95 transition-all duration-100">×</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">4</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">5</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">6</button>
<button class="col-span-1 aspect-square btn-gradient-secondary text-on-secondary-container rounded-xl flex items-center justify-center text-3xl font-bold active:scale-95 transition-all duration-100">−</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">1</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">2</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">3</button>
<button class="col-span-1 aspect-square btn-gradient-secondary text-on-secondary-container rounded-xl flex items-center justify-center text-3xl font-bold active:scale-95 transition-all duration-100">+</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">0</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">.</button>
<button class="col-span-1 aspect-square bg-surface-container-highest text-on-surface rounded-xl flex items-center justify-center text-2xl font-bold hover:bg-surface-bright active:scale-95 transition-all duration-100">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
<button class="col-span-1 aspect-square btn-gradient-tertiary text-on-tertiary-container rounded-xl flex items-center justify-center text-4xl font-bold active:scale-95 transition-all duration-100">=</button>
</div>
</div>
<aside class="hidden lg:flex flex-col h-full w-80 bg-[#141b2b] shadow-[-20px_0_40px_rgba(7,14,29,0.4)] backdrop-blur-xl p-6 border-l border-white/5">
<div class="mb-8">
<h2 class="text-white font-headline text-xl font-bold mb-1">Geçmiş</h2>
<p class="text-slate-400 text-sm">Son İşlemler</p>
</div>
<div class="flex-grow space-y-6 overflow-y-auto pr-2">
<div class="group cursor-pointer hover:bg-white/5 p-3 rounded-lg transition-all">
<div class="text-outline text-xs text-right mb-1">50 × 2</div>
<div class="text-on-surface text-lg font-bold text-right">100</div>
</div>
<div class="group cursor-pointer hover:bg-white/5 p-3 rounded-lg transition-all border-r-2 border-error/50 bg-error/5">
<div class="text-error text-xs text-right mb-1">125 ÷ 0</div>
<div class="text-error text-lg font-bold text-right flex items-center justify-end gap-1">
<span class="material-symbols-outlined text-sm" data-icon="warning">warning</span>
                        Tanımsız
                    </div>
</div>
<div class="group cursor-pointer hover:bg-white/5 p-3 rounded-lg transition-all">
<div class="text-outline text-xs text-right mb-1">999 + 1</div>
<div class="text-on-surface text-lg font-bold text-right">1.000</div>
</div>
<div class="group cursor-pointer bg-blue-600/10 p-3 rounded-lg transition-all">
<div class="text-outline text-xs text-right mb-1">15²</div>
<div class="text-blue-400 text-lg font-bold text-right">225</div>
</div>
</div>
<div class="mt-auto pt-6 border-t border-white/5 flex flex-col gap-2">
<button class="flex items-center gap-3 text-slate-300 hover:bg-white/10 p-3 rounded-xl transition-all">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-sm font-medium">Ayarlar</span>
</button>
</div>
</aside>
</main>
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-surface-container-high/90 backdrop-blur-md px-4 py-3 rounded-full border border-white/10 flex items-center gap-4 lg:hidden z-[60] shadow-2xl">
<button class="p-2 text-primary hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
</button>
<div class="w-px h-6 bg-white/10"></div>
<button class="p-2 text-slate-400 hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
<button class="p-2 text-slate-400 hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="functions">functions</span>
</button>
<button class="p-2 text-slate-400 hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</body></html>
