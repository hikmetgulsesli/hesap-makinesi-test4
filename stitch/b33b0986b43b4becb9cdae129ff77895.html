<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#007d55",
                    "on-tertiary-fixed-variant": "#005236",
                    "tertiary-fixed": "#6ffbbe",
                    "on-error-container": "#ffdad6",
                    "error-container": "#93000a",
                    "surface-container-lowest": "#070e1d",
                    "background": "#0c1322",
                    "inverse-on-surface": "#293040",
                    "on-surface": "#dce2f7",
                    "tertiary": "#4edea3",
                    "surface-container-low": "#141b2b",
                    "on-secondary-fixed": "#2a1700",
                    "surface-container-high": "#232a3a",
                    "primary-fixed-dim": "#b4c5ff",
                    "secondary": "#ffb95f",
                    "on-primary-container": "#eeefff",
                    "error": "#ffb4ab",
                    "surface": "#0c1322",
                    "on-secondary-fixed-variant": "#653e00",
                    "primary": "#b4c5ff",
                    "secondary-fixed-dim": "#ffb95f",
                    "surface-bright": "#323949",
                    "inverse-surface": "#dce2f7",
                    "secondary-fixed": "#ffddb8",
                    "secondary-container": "#ee9800",
                    "on-primary": "#002a78",
                    "on-primary-fixed": "#00174b",
                    "on-tertiary-container": "#bdffdb",
                    "tertiary-fixed-dim": "#4edea3",
                    "outline": "#8d90a0",
                    "on-surface-variant": "#c3c6d7",
                    "on-tertiary": "#003824",
                    "surface-container": "#191f2f",
                    "surface-dim": "#0c1322",
                    "surface-tint": "#b4c5ff",
                    "on-tertiary-fixed": "#002113",
                    "primary-container": "#2563eb",
                    "primary-fixed": "#dbe1ff",
                    "inverse-primary": "#0053db",
                    "on-secondary-container": "#5b3800",
                    "on-secondary": "#472a00",
                    "surface-variant": "#2e3545",
                    "on-error": "#690005",
                    "on-background": "#dce2f7",
                    "surface-container-highest": "#2e3545",
                    "outline-variant": "#434655",
                    "on-primary-fixed-variant": "#003ea8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c1322;
        }
        .font-headline {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex flex-col h-screen overflow-hidden">
<header class="bg-[#070e1d] shadow-none flex justify-between items-center w-full px-6 py-4 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-blue-600 text-2xl">calculate</span>
<h1 class="font-['Space_Grotesk'] text-lg font-bold tracking-tight text-slate-100">Hesap Makinesi</h1>
</div>
<div class="flex items-center gap-4">
<button class="text-slate-400 hover:bg-[#141b2b] transition-colors active:scale-95 duration-100 p-2 rounded-lg">
<span class="material-symbols-outlined">history</span>
</button>
<button class="text-blue-600 dark:text-blue-500 font-['Space_Grotesk'] text-lg font-bold tracking-tight active:scale-95 duration-100">Temizle</button>
</div>
</header>
<main class="flex-1 flex overflow-hidden relative">
<div class="flex-1 flex flex-col p-6 lg:p-12 max-w-4xl mx-auto w-full transition-all duration-300">
<div class="flex-1 bg-surface-container-lowest rounded-xl mb-6 p-8 flex flex-col justify-end items-end gap-2 border border-outline-variant/10">
<span class="text-outline text-2xl font-headline opacity-50">1,250 × 4</span>
<span class="text-on-surface text-6xl lg:text-8xl font-headline font-bold tracking-tighter">5,000</span>
</div>
<div class="grid grid-cols-4 gap-4 flex-[2] bg-surface-container-low p-6 rounded-xl">
<button class="bg-error-container text-on-error-container text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:opacity-90 active:scale-95 transition-all">AC</button>
<button class="bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all">+/-</button>
<button class="bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all">%</button>
<button class="bg-secondary-container text-on-secondary-container text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:opacity-90 active:scale-95 transition-all bg-gradient-to-b from-secondary to-secondary-container">÷</button>
<button class="bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all">7</button>
<button class="bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all">8</button>
<button class="bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all">9</button>
<button class="bg-secondary-container text-on-secondary-container text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:opacity-90 active:scale-95 transition-all bg-gradient-to-b from-secondary to-secondary-container">×</button>
<button class="bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all">4</button>
<button class="bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all">5</button>
<button class="bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all">6</button>
<button class="bg-secondary-container text-on-secondary-container text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:opacity-90 active:scale-95 transition-all bg-gradient-to-b from-secondary to-secondary-container">−</button>
<button class="bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all">1</button>
<button class="bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all">2</button>
<button class="bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all">3</button>
<button class="bg-secondary-container text-on-secondary-container text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:opacity-90 active:scale-95 transition-all bg-gradient-to-b from-secondary to-secondary-container">+</button>
<button class="col-span-2 bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl flex items-center justify-start px-8 hover:bg-surface-variant active:scale-95 transition-all">0</button>
<button class="bg-surface-container-highest text-on-surface text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all">,</button>
<button class="bg-tertiary-container text-on-tertiary-container text-xl font-bold font-body rounded-xl aspect-square flex items-center justify-center hover:opacity-90 active:scale-95 transition-all bg-gradient-to-b from-tertiary to-tertiary-container">=</button>
</div>
</div>
<aside class="bg-[#323949]/80 backdrop-blur-xl fixed right-0 h-full w-80 shadow-[-20px_0_40px_rgba(7,14,29,0.4)] flex flex-col z-40 transform transition-transform duration-300">
<div class="p-6 flex items-center justify-between">
<div>
<h2 class="text-white text-lg font-bold font-headline">Geçmiş</h2>
<p class="text-slate-400 text-xs font-label">Son İşlemler</p>
</div>
<span class="material-symbols-outlined text-slate-400 cursor-pointer hover:text-white transition-colors">close</span>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-8 text-center">
<div class="mb-6 relative">
<div class="w-24 h-24 rounded-full bg-surface-container-low flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-outline text-5xl opacity-40">history_toggle_off</span>
</div>
<div class="absolute -top-2 -right-2">
<span class="material-symbols-outlined text-blue-500 text-2xl bg-surface-container rounded-full p-1 border border-outline-variant/20">query_stats</span>
</div>
</div>
<h3 class="text-on-surface text-base font-bold mb-2">Henüz işlem yapılmadı</h3>
<p class="text-outline text-sm leading-relaxed max-w-[200px]">
                    Yaptığınız hesaplamalar burada listelenecektir.
                </p>
<div aria-hidden="true" class="mt-12 w-full space-y-4 opacity-10 select-none pointer-events-none">
<div class="flex flex-col items-end gap-1">
<div class="h-3 w-24 bg-outline rounded-full"></div>
<div class="h-5 w-32 bg-on-surface rounded-full"></div>
</div>
<div class="flex flex-col items-end gap-1">
<div class="h-3 w-16 bg-outline rounded-full"></div>
<div class="h-5 w-28 bg-on-surface rounded-full"></div>
</div>
</div>
</div>
<div class="p-6 border-t border-white/5 mt-auto">
<button class="flex items-center gap-3 w-full p-3 rounded-lg text-slate-300 hover:bg-white/10 transition-all duration-300 ease-in-out">
<span class="material-symbols-outlined text-blue-500">settings</span>
<span class="font-['Inter'] text-sm">Ayarlar</span>
</button>
</div>
</aside>
</main>
<div class="hidden md:flex fixed bottom-6 left-6 gap-2">
<div class="bg-surface-container-high rounded-full px-4 py-2 flex items-center gap-2 border border-outline-variant/10">
<div class="w-2 h-2 rounded-full bg-tertiary"></div>
<span class="text-[10px] uppercase tracking-widest font-bold text-outline">Hassas Mod Aktif</span>
</div>
</div>
</body></html>
